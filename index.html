		}
	
		keyboardUSe();
	}
		function initPlanets() {
			planetInfo = {
				width: 30,
				height: 30,
				count: {
					row: 4,
					col: 2,
				},
				offset: {
					top: 30,
					left: 150
				},
				padding: 80
			}
			planets = game.add.group();
			
			for(i=0;i<posAnswer;i++){
				arr[i]=Phaser.Math.between(2,40);
			}
			for(i=posAnswer+1;i<planetInfo.count.col*planetInfo.count.row;i++){
				arr[i]=Phaser.Math.between(2,40);
			}
			for(c=0; c<planetInfo.count.col; c++) {
				for(r=0; r<planetInfo.count.row; r++) {
					
					var planetX = (r*(planetInfo.width+planetInfo.padding))+planetInfo.offset.left;
					var planetY = (c*(planetInfo.height+planetInfo.padding))+planetInfo.offset.top;
					newPlanet = game.add.sprite(planetX, planetY, 'planet5');
					game.physics.enable(newPlanet, Phaser.Physics.ARCADE);
					newPlanet.body.immovable = true;
					newPlanet.anchor.set(0.5);
					planets.add(newPlanet);
				}
			}
	}
	
	function initAddNumbers() {
			number1=Phaser.Math.between(1,20);
			number2=Phaser.Math.between(1,20);
			answer=number1+number2;
			arr[posAnswer]=answer;
			addQuizText = game.add.text(5, game.world.height-32, number1+' + '+ number2+' = ? ', textStyle);
			addQuizText.visible=false;
			planetInfo = {
				width: 30,
				height: 30,
				count: {
					row: 4,
					col: 2,
				},
				offset: {
					top: 30,

				},
				padding: 80
			}
			numbers = game.add.group();
			
			for(i=0;i<posAnswer;i++){
				arr[i]=Phaser.Math.between(2,40);
			}
			for(i=posAnswer+1;i<planetInfo.count.col*planetInfo.count.row;i++){
				arr[i]=Phaser.Math.between(2,40);
			}
			i=0;
			j=0;
			
			for(c=0; c<planetInfo.count.col; c++) {
				for(r=0; r<planetInfo.count.row; r++) {

	function rocketHitNumber(rocket, number) {
		var killTween = game.add.tween(number.scale);
		if((rocket.x>arrX[posAnswer]-30)&&(rocket.x<arrX[posAnswer]+30)&&(rocket.y>arrY[posAnswer]-30)&&(rocket.y<arrY[posAnswer]+30)){
		killTween.to({x:0,y:0}, 100, Phaser.Easing.Linear.None);
		killTween.onComplete.addOnce(function(){
			//planetText.kill();
			number.kill();
			//planetText.kill();
		}, this);
		killTween.start();
		score += 10;
		scoreText.setText(score);

		if(score === planetInfo.count.row*planetInfo.count.col*10) {
			if (playingAddition) {
				playingAddition = false;
				addQuizText.visible = false;
			}
			else if (playingSubstraction) {
				playingSubstraction = false;
				subQuizText.visible = false;
			}
			else if (playingMultiplication) {
				playingMultiplication = false;
				multiQuizText.visible = false;
			}
			else if (playingDivision) {
				playingDivision = false;
				divQuizText.visible = false;
			}

			game.time.events.remove(timerEvents);
			successAudio.mute = true;
			lostAudio.mute = true;
			backgroundAudio.stop();
			gainAudio.play();

			showWinScreen();
			return;
		}
		
		arr.splice(posAnswer,1);
		arrX.splice(posAnswer,1);
		arrY.splice(posAnswer,1);
		posAnswer=Phaser.Math.between(0,arr.length-1);
		
		
		rocket.reset(game.world.width*0.5, game.world.height-20);
			if(playingAddition){
			number1=Phaser.Math.between(1,arr[posAnswer]/2);
			number2=arr[posAnswer]-number1;
			addQuizText.visible=false;
			addQuizText = game.add.text(20, game.world.height-30, number1+' + '+ number2+' = ? ' , textStyle);
			addQuizText.visible=true;
			}
			else if(playingSubstraction){
			number1=Phaser.Math.between(arr[posAnswer],arr[posAnswer]*2);
			number2=number1-arr[posAnswer];
			subQuizText.visible=false;
			subQuizText = game.add.text(20, game.world.height-30, number1+' - '+ number2+' = ? ' , textStyle);
			subQuizText.visible=true;
			}
			else if(playingMultiplication){
			var ind=Phaser.Math.between(0,(getFactors(arr[posAnswer]).length)-1);
			number1=getFactors(arr[posAnswer])[ind];
			number2=arr[posAnswer]/number1;
			multiQuizText.visible=false;
			multiQuizText = game.add.text(20, game.world.height-30, number1+' x '+ number2+' = ? ' , textStyle);
			multiQuizText.visible=true;
			}
			else if(playingDivision){
			//var ind=Phaser.Math.between(0,(getFactors(arr[posAnswer]).length)-1);
			number1=arr[posAnswer]*Phaser.Math.between(1,10);
			number2=number1/arr[posAnswer];
			divQuizText.visible=false;
			divQuizText = game.add.text(20, game.world.height-30, number1+' / '+ number2+' = ? ' , textStyle);
			divQuizText.visible=true;
			}
			successAudio.play();
			successButton.visible=true;
			game.time.events.add(Phaser.Timer.SECOND *1, success, this);  
		}
		else{
			rocketLeaveScreen();
  
		}
		rocket.angle=0;
		
		
	}
	
		function rocketLeaveScreen() {
		lives--;
		if(lives) {
			if(lives==2){
				heart1.visible=false;
			}
			if(lives==1){
				heart2.visible=false;
			}
			rocket.reset(game.world.width*0.5, game.world.height-25);
			rocket.angle=0;
			
			failureButton.visible=true;
			game.time.events.add(Phaser.Timer.SECOND *1, failure, this);  
			lostAudio.play();
		}

		else {
			heart1.visible = false;
			heart2.visible = false;
			heart3.visible = false;

			game.time.events.remove(timerEvents);
			successAudio.mute = true;
			lostAudio.mute = true;
			backgroundAudio.stop();
			overAudio.play();

			showLoseScreen();
		}
	}

	function getFactors(n){
    // Create an empty list for factors
    var factors= new Array();

    //Loop over all factors
    for(i=1;i<n+1;i++)
        if(n%i==0){
            factors.push(i);
			}
    //Return the list of factors
    return factors
	}

			pauseButton.visible=true;
			timerEvents=game.time.events.loop(Phaser.Timer.SECOND, updateTime, this);
	}
	function soundOffButton() {

		backgroundAudio.mute=false;
		startAudio.mute=false;
		successAudio.mute=false;
		lostAudio.mute=false;
		keyPressAudio.mute=false;
		soundOffButton.visible=false;
		soundOnButton.visible=true;
		
		overAudio.mute=false;
		gainAudio.mute=false;
		
	}
	function soundOnButton() {
		backgroundAudio.mute=true;
		startAudio.mute=true;
		successAudio.mute=true;
		lostAudio.mute=true;
		keyPressAudio.mute=true;
		soundOnButton.visible=false;
		soundOffButton.visible=true;
		
		overAudio.mute=true;
		gainAudio.mute=true;
	}
	
	function success(){
		
		successButton.visible=false;
	}
	function failure(){
		
		failureButton.visible=false;
	}
	function lost(){
		location.reload();
	}
	function win(){
		location.reload();
	}
	
	function haut(){
		rocket.body.velocity.set(0,-30);
		game.time.events.add(Phaser.Timer.SECOND *0.5, droite, this);  
	}
	function droite(){
		rocket.body.velocity.set(30,0);
		game.time.events.add(Phaser.Timer.SECOND *0.5, bas, this);
	}
	function bas(){
		rocket.body.velocity.set(0,30);
		game.time.events.add(Phaser.Timer.SECOND *0.5, gauche, this);
	}
	function gauche(){
		rocket.body.velocity.set(-30,0);
		
	}
	
	function updateTime() {

    Time++;

    text.setText(Time+'s');

}
</script>
</body>
</html>
